<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ringo Dashboard</title>
<style>
  :root {
    --bg:       #07070f;
    --surface:  #0f0f1e;
    --surface2: #161628;
    --border:   #22223a;
    --accent:   #7c6af7;
    --accent2:  #5e52d4;
    --success:  #00d4aa;
    --warning:  #ffb347;
    --danger:   #ff4455;
    --text:     #ddddf5;
    --muted:    #6868a0;
    --font-mono: 'Courier New', Courier, monospace;
    --font-ui:   -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-ui);
         min-height: 100vh; display: flex; flex-direction: column; }

  /* ── Nav ── */
  nav { background: var(--surface); border-bottom: 1px solid var(--border);
        padding: 0 24px; height: 52px; display: flex; align-items: center;
        gap: 16px; position: sticky; top: 0; z-index: 100; }
  .logo { font-size: 1.1rem; font-weight: 700; letter-spacing: 1px;
          color: var(--accent); text-decoration: none; display: flex;
          align-items: center; gap: 8px; }
  .logo span { opacity: .6; font-size: .85rem; }
  nav a { color: var(--muted); text-decoration: none; font-size: .9rem;
          padding: 4px 10px; border-radius: 6px; transition: .15s; }
  nav a:hover, nav a.active { color: var(--text); background: var(--surface2); }
  nav a.active { color: var(--accent); }
  .spacer { flex: 1; }
  #ws-dot { width: 8px; height: 8px; border-radius: 50%;
            background: var(--muted); transition: background .3s; }
  #ws-dot.ok { background: var(--success); box-shadow: 0 0 6px var(--success); }
  #ws-dot.err { background: var(--danger); }

  /* ── Layout ── */
  .main { flex: 1; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px;
          max-width: 1400px; width: 100%; margin: 0 auto; }

  /* ── Cards ── */
  .card { background: var(--surface); border: 1px solid var(--border);
          border-radius: 10px; overflow: hidden; }
  .card-header { padding: 12px 18px; border-bottom: 1px solid var(--border);
                 display: flex; align-items: center; gap: 10px; }
  .card-title { font-size: .8rem; text-transform: uppercase; letter-spacing: 1px;
                color: var(--muted); font-weight: 600; }
  .card-body { padding: 16px 18px; }

  /* ── Status row ── */
  .top-row { display: grid; grid-template-columns: 380px 1fr; gap: 16px; }
  @media (max-width: 860px) { .top-row { grid-template-columns: 1fr; } }

  /* ── Session card ── */
  .badge { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px;
           border-radius: 20px; font-size: .78rem; font-weight: 600; }
  .badge.inactive { background: rgba(104,104,160,.18); color: var(--muted); }
  .badge.active   { background: rgba(0,212,170,.15); color: var(--success); }
  .badge::before  { content: ''; width: 7px; height: 7px; border-radius: 50%;
                    background: currentColor; }
  .badge.active::before { animation: pulse 1.4s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }

  .timer { font-size: 2.2rem; font-weight: 700; font-family: var(--font-mono);
           color: var(--text); letter-spacing: 2px; margin: 12px 0 16px; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }

  /* ── Buttons ── */
  button { cursor: pointer; border: none; border-radius: 7px; font-size: .88rem;
           font-weight: 600; padding: 9px 18px; transition: .15s; display: flex;
           align-items: center; gap: 7px; font-family: var(--font-ui); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-secondary { background: var(--surface2); color: var(--text);
                   border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #cc3344; }
  button:disabled { opacity: .4; cursor: not-allowed; }

  .emergency { width: 100%; margin-top: 14px; padding: 14px; font-size: 1rem;
               letter-spacing: 1px; border-radius: 9px; justify-content: center;
               background: rgba(255,68,85,.12); color: var(--danger);
               border: 2px solid var(--danger); }
  .emergency:hover { background: var(--danger); color: #fff; }

  /* ── Stats card ── */
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .stat { background: var(--surface2); border-radius: 8px; padding: 14px 16px; }
  .stat-val { font-size: 1.6rem; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: .75rem; color: var(--muted); margin-top: 3px; }

  /* ── Chat row ── */
  .chat-row { display: flex; gap: 10px; }
  .chat-input { flex: 1; background: var(--surface2); border: 1px solid var(--border);
                border-radius: 7px; color: var(--text); font-size: .9rem; padding: 9px 14px;
                font-family: var(--font-ui); outline: none; transition: border-color .2s; }
  .chat-input:focus { border-color: var(--accent); }
  .chat-input::placeholder { color: var(--muted); }

  /* ── Log stream ── */
  .log-controls { display: flex; align-items: center; gap: 12px; margin-left: auto; }
  .log-controls label { font-size: .8rem; color: var(--muted); display: flex;
                        align-items: center; gap: 6px; cursor: pointer; }
  #log-count { font-size: .8rem; color: var(--muted); }
  .btn-sm { padding: 5px 12px; font-size: .78rem; }
  #log-stream { background: var(--bg); font-family: var(--font-mono); font-size: .82rem;
                line-height: 1.55; overflow-y: auto; height: 480px; padding: 10px 14px; }
  .log-entry { display: grid; grid-template-columns: 82px 60px 120px 1fr;
               gap: 0 12px; padding: 1.5px 0; border-bottom: 1px solid transparent; }
  .log-entry:hover { background: rgba(255,255,255,.03); border-bottom-color: var(--border); }
  .log-time { color: var(--muted); white-space: nowrap; }
  .log-level { font-weight: 700; }
  .log-logger { color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .log-msg { word-break: break-word; }
  .lvl-DEBUG    { color: #5555aa; }
  .lvl-INFO     { color: #a0a0dd; }
  .lvl-WARNING  { color: var(--warning); }
  .lvl-ERROR    { color: var(--danger); }
  .lvl-CRITICAL { color: var(--danger); background: rgba(255,68,85,.15);
                  padding: 0 6px; border-radius: 3px; }
  .msg-INFO     { color: var(--text); }
  .msg-WARNING  { color: var(--warning); }
  .msg-ERROR    { color: var(--danger); }
  .msg-CRITICAL { color: var(--danger); font-weight: 700; }
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">🤖 Ringo <span>Dashboard</span></a>
  <a href="/" class="active">📊 Logs</a>
  <a href="/control">🕹 Control</a>
  <div class="spacer"></div>
  <div id="ws-dot" title="WebSocket status"></div>
</nav>

<div class="main">

  <div class="top-row">

    <!-- Session card -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Session</span>
        <div id="session-badge" class="badge inactive">Inactive</div>
      </div>
      <div class="card-body">
        <div class="timer" id="timer">00:00</div>
        <div class="btn-row">
          <button class="btn-primary" id="btn-start" onclick="startSession()">▶ Start Session</button>
          <button class="btn-secondary" id="btn-stop" onclick="stopSession()" disabled>⏹ Stop</button>
        </div>

        <!-- Chat to active session -->
        <div style="margin-top:14px;">
          <div style="font-size:.78rem;color:var(--muted);margin-bottom:6px;">
            Send text message to active session
          </div>
          <div class="chat-row">
            <input class="chat-input" id="chat-input" placeholder="Say something to Ringo…"
                   onkeydown="if(event.key==='Enter')sendChat()">
            <button class="btn-secondary btn-sm" onclick="sendChat()">Send</button>
          </div>
        </div>

        <button class="btn-danger emergency" onclick="emergencyStop()">
          🛑 EMERGENCY STOP
        </button>
      </div>
    </div>

    <!-- Stats card -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Activity</span>
      </div>
      <div class="card-body">
        <div class="stats-grid">
          <div class="stat">
            <div class="stat-val" id="stat-logs">0</div>
            <div class="stat-label">Log entries</div>
          </div>
          <div class="stat">
            <div class="stat-val" id="stat-warnings">0</div>
            <div class="stat-label">Warnings</div>
          </div>
          <div class="stat">
            <div class="stat-val" id="stat-errors">0</div>
            <div class="stat-label">Errors</div>
          </div>
        </div>
        <div style="margin-top:14px;padding:12px;background:var(--surface2);border-radius:8px;
                    font-size:.82rem;color:var(--muted);line-height:1.6;">
          <div>💡 Lights: <strong id="stat-lights" style="color:var(--text)">—</strong></div>
          <div style="margin-top:4px;">🔗 WS connections active for real-time updates.</div>
          <div style="margin-top:4px;">Head to <a href="/control" style="color:var(--accent)">
            Control →</a> for camera and movement.</div>
        </div>
      </div>
    </div>

  </div><!-- .top-row -->

  <!-- Log stream -->
  <div class="card" style="flex:1;">
    <div class="card-header">
      <span class="card-title">Live Logs</span>
      <span id="log-count">0 entries</span>
      <div class="log-controls">
        <label><input type="checkbox" id="auto-scroll" checked> auto-scroll</label>
        <label>
          <input type="checkbox" id="filter-debug"> hide DEBUG
        </label>
        <button class="btn-secondary btn-sm" onclick="clearLogs()">Clear</button>
      </div>
    </div>
    <div id="log-stream"></div>
  </div>

</div><!-- .main -->

<script>
// ── State ────────────────────────────────────────────────────────────────────
let ws = null;
let sessionActive = false;
let timerInterval = null;
let elapsedSeconds = 0;
let logCount = 0;
let warnCount = 0;
let errorCount = 0;
const MAX_ENTRIES = 500;

// ── WebSocket ────────────────────────────────────────────────────────────────
function connect() {
  ws = new WebSocket(`ws://${location.host}/ws/logs`);

  ws.onopen = () => {
    document.getElementById('ws-dot').className = 'ok';
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.ping) return;
    appendLog(data);
  };

  ws.onclose = () => {
    document.getElementById('ws-dot').className = 'err';
    setTimeout(connect, 2000);
  };

  ws.onerror = () => ws.close();
}

// ── Logging ──────────────────────────────────────────────────────────────────
function appendLog(entry) {
  const hideDebug = document.getElementById('filter-debug').checked;
  if (hideDebug && entry.level === 'DEBUG') return;

  const stream = document.getElementById('log-stream');
  const div = document.createElement('div');
  div.className = 'log-entry';
  div.innerHTML = `
    <span class="log-time">${esc(entry.time)}</span>
    <span class="log-level lvl-${entry.level}">${entry.level.slice(0,4)}</span>
    <span class="log-logger">${esc(entry.logger || '')}</span>
    <span class="log-msg msg-${entry.level}">${esc(entry.message)}</span>
  `;
  stream.appendChild(div);

  // Trim old entries
  while (stream.children.length > MAX_ENTRIES) {
    stream.removeChild(stream.firstChild);
  }

  logCount++;
  if (entry.level === 'WARNING') warnCount++;
  if (entry.level === 'ERROR' || entry.level === 'CRITICAL') errorCount++;

  document.getElementById('stat-logs').textContent = logCount;
  document.getElementById('stat-warnings').textContent = warnCount;
  document.getElementById('stat-errors').textContent = errorCount;
  document.getElementById('log-count').textContent = `${stream.children.length} entries`;

  if (document.getElementById('auto-scroll').checked) {
    stream.scrollTop = stream.scrollHeight;
  }
}

function clearLogs() {
  document.getElementById('log-stream').innerHTML = '';
  logCount = warnCount = errorCount = 0;
  document.getElementById('stat-logs').textContent = '0';
  document.getElementById('stat-warnings').textContent = '0';
  document.getElementById('stat-errors').textContent = '0';
  document.getElementById('log-count').textContent = '0 entries';
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Session timer ─────────────────────────────────────────────────────────────
function startTimer() {
  clearInterval(timerInterval);
  elapsedSeconds = 0;
  timerInterval = setInterval(() => {
    elapsedSeconds++;
    const m = String(Math.floor(elapsedSeconds / 60)).padStart(2, '0');
    const s = String(elapsedSeconds % 60).padStart(2, '0');
    document.getElementById('timer').textContent = `${m}:${s}`;
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  document.getElementById('timer').textContent = '00:00';
}

// ── Session control ──────────────────────────────────────────────────────────
async function startSession() {
  const res = await fetch('/api/session/start', { method: 'POST' });
  const data = await res.json();
  if (data.ok) {
    sessionActive = true;
    document.getElementById('session-badge').className = 'badge active';
    document.getElementById('session-badge').textContent = 'Active';
    document.getElementById('btn-start').disabled = true;
    document.getElementById('btn-stop').disabled = false;
    startTimer();
  } else {
    alert(data.reason || 'Failed to start');
  }
}

async function stopSession() {
  await fetch('/api/session/stop', { method: 'POST' });
  sessionActive = false;
  document.getElementById('session-badge').className = 'badge inactive';
  document.getElementById('session-badge').textContent = 'Inactive';
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-stop').disabled = true;
  stopTimer();
}

async function emergencyStop() {
  await fetch('/api/emergency-stop', { method: 'POST' });
  sessionActive = false;
  document.getElementById('session-badge').className = 'badge inactive';
  document.getElementById('session-badge').textContent = 'Inactive';
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-stop').disabled = true;
  stopTimer();
}

// ── Chat ─────────────────────────────────────────────────────────────────────
async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: msg }),
  });
  const data = await res.json();
  if (!data.ok) alert(data.reason || 'Failed to send');
}

// ── Poll status ──────────────────────────────────────────────────────────────
async function pollStatus() {
  try {
    const res = await fetch('/api/status');
    const data = await res.json();
    if (data.session_active !== sessionActive) {
      if (data.session_active) {
        sessionActive = true;
        document.getElementById('session-badge').className = 'badge active';
        document.getElementById('session-badge').textContent = 'Active';
        document.getElementById('btn-start').disabled = true;
        document.getElementById('btn-stop').disabled = false;
        if (!timerInterval) startTimer();
      } else {
        sessionActive = false;
        document.getElementById('session-badge').className = 'badge inactive';
        document.getElementById('session-badge').textContent = 'Inactive';
        document.getElementById('btn-start').disabled = false;
        document.getElementById('btn-stop').disabled = true;
        stopTimer();
      }
    }
    if (data.light_state) {
      document.getElementById('stat-lights').textContent = data.light_state;
    }
  } catch(e) {}
}

// ── Init ─────────────────────────────────────────────────────────────────────
connect();
pollStatus();
setInterval(pollStatus, 3000);
</script>
</body>
</html>
